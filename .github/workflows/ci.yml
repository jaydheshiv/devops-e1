name: CI (tests, docker, security)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ride-request-service, matching-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps + run pytest
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pytest -v

      - name: Dependency scan (pip-audit)
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements-dev.txt

  docker-and-scan:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images (runs unit tests via Dockerfile test stage)
        run: |
          docker build --target test -t ride-request-service:test -f ride-request-service/Dockerfile ride-request-service
          docker build --target runtime -t ride-request-service:ci -f ride-request-service/Dockerfile ride-request-service
          docker build --target test -t matching-service:test -f matching-service/Dockerfile matching-service
          docker build --target runtime -t matching-service:ci -f matching-service/Dockerfile matching-service

      - name: Trivy image scan (Ride Request)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "ride-request-service:ci"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Trivy image scan (Matching)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "matching-service:ci"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag + push images to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IMAGE_PREFIX: ghcr.io/${{ github.repository }}
        run: |
          docker tag ride-request-service:ci ${IMAGE_PREFIX}/ride-request-service:latest
          docker tag matching-service:ci ${IMAGE_PREFIX}/matching-service:latest
          docker push ${IMAGE_PREFIX}/ride-request-service:latest
          docker push ${IMAGE_PREFIX}/matching-service:latest

  sonarcloud:
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
