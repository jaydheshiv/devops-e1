name: CI (tests, docker, security)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ride-request-service, matching-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps + run pytest
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pytest -v

      - name: Dependency scan (pip-audit)
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements-dev.txt -f json -o pip-audit.json || true
          python - <<'PY'
          import json
          import sys

          threshold = 7.0
          with open("pip-audit.json", "r", encoding="utf-8") as handle:
            data = json.load(handle)

          findings = data.get("dependencies", [])
          high = []

          for dep in findings:
            for vuln in dep.get("vulns", []):
              severities = vuln.get("severity", []) or []
              for entry in severities:
                score = entry.get("score")
                if score is not None and score >= threshold:
                  high.append((dep.get("name"), vuln.get("id"), score))

          if high:
            print("High/Critical vulnerabilities detected:")
            for name, vid, score in high:
              print(f"- {name} {vid} (score {score})")
            sys.exit(1)

          print("No high/critical vulnerabilities found.")
          PY

  docker-and-scan:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images (runs unit tests via Dockerfile test stage)
        run: |
          docker build --target test -t ride-request-service:test -f ride-request-service/Dockerfile ride-request-service
          docker build --target runtime -t ride-request-service:ci -f ride-request-service/Dockerfile ride-request-service
          docker build --target test -t matching-service:test -f matching-service/Dockerfile matching-service
          docker build --target runtime -t matching-service:ci -f matching-service/Dockerfile matching-service

      - name: Trivy image scan (Ride Request)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ride-request-service:ci"
          format: "json"
          output: "trivy-ride-request.json"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

        - name: Enforce CRITICAL gate (Ride Request)
        run: |
          python - <<'PY'
          import json
          import sys

          with open("trivy-ride-request.json", "r", encoding="utf-8") as handle:
            data = json.load(handle)

          critical = 0
          for result in data.get("Results", []):
            for vuln in result.get("Vulnerabilities", []) or []:
              if vuln.get("Severity") == "CRITICAL":
                critical += 1

          if critical:
            print(f"CRITICAL vulnerabilities detected: {critical}")
            sys.exit(1)

          print("No CRITICAL vulnerabilities found.")
          PY

      - name: Trivy image scan (Matching)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "matching-service:ci"
          format: "json"
          output: "trivy-matching.json"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

        - name: Enforce CRITICAL gate (Matching)
        run: |
          python - <<'PY'
          import json
          import sys

          with open("trivy-matching.json", "r", encoding="utf-8") as handle:
            data = json.load(handle)

          critical = 0
          for result in data.get("Results", []):
            for vuln in result.get("Vulnerabilities", []) or []:
              if vuln.get("Severity") == "CRITICAL":
                critical += 1

          if critical:
            print(f"CRITICAL vulnerabilities detected: {critical}")
            sys.exit(1)

          print("No CRITICAL vulnerabilities found.")
          PY

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag + push images to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IMAGE_PREFIX: ghcr.io/${{ github.repository }}
        run: |
          docker tag ride-request-service:ci ${IMAGE_PREFIX}/ride-request-service:latest
          docker tag matching-service:ci ${IMAGE_PREFIX}/matching-service:latest
          docker push ${IMAGE_PREFIX}/ride-request-service:latest
          docker push ${IMAGE_PREFIX}/matching-service:latest

  sonarcloud:
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
