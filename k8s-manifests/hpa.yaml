apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ride-request-hpa
  namespace: ride-share
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ride-request
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: matching-hpa
  namespace: ride-share
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: matching
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
